# scene.toml
#
# [[type]]  defines a class of object — its visual and spatial properties.
#           Types must come before [[object]] entries.
#
# [[object]] places an instance of a type into the world.
#
# render_offset: world-tile offset added to the instance pos before projecting.
#   The projected point is where tex_origin lands on screen.
# tex_origin: pixel in the texture that sits at that projected point.
#   Together these let you align any pixel of the sprite to any tile position.

[[type]]
name    = "bookshelf"
texture = "assets/bookshelf.png"
size    = { x=1, y=2, z=2 }
render_offset = { x=0, y=2, z=0 }
tex_origin    = { x=3, y=30 }

[[type]]
name    = "couch"
texture = "assets/couch.png"
size    = { x=3, y=2, z=1 }
render_offset = { x=0, y=2, z=0 }
tex_origin    = { x=2, y=23 }

[[type]]
name    = "lamp"
texture = "assets/lamp.png"
size    = { x=1, y=1, z=2 }
render_offset = { x=0, y=0, z=0 }
tex_origin    = { x=6, y=27 }

# ----------------------------------------------------------------
# Instances
# ----------------------------------------------------------------

[[object]]
type = "bookshelf"
pos  = { x=0, y=3, z=0 }

[[object]]
type = "couch"
pos  = { x=0, y=0, z=0 }

[[object]]
type = "lamp"
pos  = { x=3, y=0, z=0 }